<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1A1209"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Juntos"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Juntos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap"/>
<script>

  var m={name:"Juntos",short_name:"Juntos",description:"Un diario de viaje para los dos",start_url:"./",display:"standalone",background_color:"#EDE4D0",theme_color:"#1A1209",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%231A1209'/%3E%3Ctext x='50%25' y='60%25' font-family='Georgia,serif' font-size='240' fill='%23E8D8B4' text-anchor='middle' dominant-baseline='middle' font-style='italic'%3Ej%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
  var b=new Blob([JSON.stringify(m)],{type:"application/json"});
  var l=document.createElement("link");l.rel="manifest";l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
})();
</script>
<style>
:root{--bg:#EDE4D0;--card:#F8F3E8;--top:#1A1209;--t1:#1A1209;--t2:#5C4A2A;--t3:#A8936A;--acc:#B07848;--acc2:#8A5C2A;--brd:#D4C4A0;--div:#E0D4B8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
#root{min-height:100vh;min-height:100dvh}

/* ── ANIMS ── */
.cr{position:fixed;width:64px;height:64px;border-radius:50%;transform:translate(-50%,-50%) scale(0);z-index:500;pointer-events:none}
.cr.in{animation:cIn .55s cubic-bezier(.22,.61,.36,1) forwards}
.cr.out{animation:cOut .35s cubic-bezier(.4,0,.6,1) forwards}
@keyframes cIn{to{transform:translate(-50%,-50%) scale(26)}}
@keyframes cOut{from{transform:translate(-50%,-50%) scale(26);opacity:1}to{transform:translate(-50%,-50%) scale(26);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wmReveal{0%{opacity:0;letter-spacing:20px}100%{opacity:1;letter-spacing:8px}}
@keyframes lineGrow{from{width:0}to{width:56px}}
@keyframes pip{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.fu{animation:fadeUp .38s cubic-bezier(.4,0,.2,1) both}
.fi{animation:fadeIn .45s ease both}

/* ── ONBOARDING SHELL ── */
.ob{min-height:100vh;min-height:100dvh;background:linear-gradient(165deg,#EDE4D0 0%,#DDD0A8 50%,#C8B888 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:32px 24px}
.ob-r{position:absolute;border-radius:50%;border:1px solid rgba(138,92,42,.13)}
.ob-content{position:relative;z-index:1;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}

/* ── SPLASH ── */
.ob-splash{min-height:80dvh;justify-content:space-between;padding:16px 0}
.ob-orn{font-size:11px;color:var(--acc);letter-spacing:10px;opacity:.55}
.ob-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ob-wm{font-family:'Italiana',serif;font-size:clamp(96px,26vw,144px);font-weight:400;color:var(--t1);letter-spacing:8px;line-height:1;text-align:center;animation:wmReveal .9s cubic-bezier(.22,.61,.36,1) both .35s}
.ob-line{width:0;height:1px;background:var(--acc);opacity:.45;animation:lineGrow .7s ease both .9s}
.ob-tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;font-weight:300;color:var(--t2);line-height:1.5;text-align:center;opacity:0;animation:fadeIn .6s ease both 1s}
.ob-bot{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}
.ob-dots{color:var(--t3);font-size:13px;letter-spacing:5px;opacity:0;animation:fadeIn .5s ease both 1.2s}
.ob-desc{font-size:14px;color:var(--t3);line-height:1.75;text-align:center;opacity:0;animation:fadeIn .5s ease both 1.35s}

/* ── CTA BUTTON ── */
.ob-cta{background:var(--t1);color:#F8F3E8;border:none;border-radius:14px;padding:15px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;transition:background .2s;opacity:0;animation:fadeIn .5s ease both 1.5s}
.ob-cta:hover{background:var(--acc2)}.ob-cta:active{transform:scale(.97)}.ob-cta:disabled{opacity:.4!important;cursor:not-allowed}
.ob-cta.noani{opacity:1;animation:none}

/* ── INTRO SLIDES ── */
.slides-wrap{width:100%;overflow:hidden;margin-bottom:24px}
.slides-track{display:flex;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;text-align:center}
.slide-icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:32px}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--t1);margin-bottom:8px;line-height:1.2}
.slide-body{font-size:14px;color:var(--t3);line-height:1.75;max-width:280px}
.slide-dots{display:flex;gap:7px;justify-content:center;margin-bottom:20px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--brd);transition:all .25s;cursor:pointer}
.sdot.on{background:var(--acc);width:18px;border-radius:4px}
.slides-nav{display:flex;gap:10px;width:100%}
.sback{flex:0 0 auto;background:var(--div);color:var(--t2);border:none;border-radius:12px;padding:13px 18px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.snext{flex:1;background:var(--t1);color:#F8F3E8;border:none;border-radius:12px;padding:13px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .2s}
.snext:hover{background:var(--acc2)}

/* ── NAMES STEP ── */
.ob-mini{font-family:'Italiana',serif;font-size:30px;letter-spacing:5px;color:var(--t1);text-align:center;margin-bottom:14px}
.ob-nt{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--t1);margin-bottom:6px;text-align:center}
.ob-ns{font-size:13px;color:var(--t3);line-height:1.6;text-align:center;margin-bottom:24px}
.ob-fields{width:100%;margin-bottom:20px}
.ob-lbl{display:block;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ob-inp{width:100%;padding:12px 16px;background:#F8F3E8;border:1.5px solid var(--brd);border-radius:12px;font-family:'Jost',sans-serif;font-size:16px;color:var(--t1);outline:none;transition:border-color .2s;text-align:center}
.ob-inp:focus{border-color:var(--acc)}.ob-inp::placeholder{color:var(--t3);font-size:14px}
.ob-amp{height:36px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--acc);opacity:.7}
.ob-prev{margin-bottom:20px;padding:11px 16px;background:rgba(176,120,72,.08);border-radius:12px;border:1px solid rgba(176,120,72,.2);width:100%;text-align:center}
.ob-prev span{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--t1)}
.ob-prev em{font-style:italic;color:var(--acc);margin:0 5px}
.ob-back{background:transparent;border:none;font-family:'Jost',sans-serif;font-size:13px;color:var(--t3);cursor:pointer;margin-top:14px;padding:6px}

/* ── PAIR CODE BOXES ── */
.pc-box{background:rgba(176,120,72,.07);border:1px solid rgba(176,120,72,.2);border-radius:14px;padding:16px;margin-bottom:16px;width:100%}
.pc-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.pc-or{text-align:center;color:var(--t3);font-size:12px;margin:4px 0 12px;letter-spacing:2px;text-transform:uppercase}

/* ── CODE DISPLAY (step 4) ── */
.code-display{background:var(--card);border:2px solid var(--acc);border-radius:14px;padding:20px 16px;width:100%;margin-bottom:16px;text-align:center}
.code-val{font-family:monospace;font-size:13px;word-break:break-all;color:var(--t1);line-height:1.6;letter-spacing:.5px;margin:8px 0 14px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--brd)}
.copy-btn{width:100%;background:var(--acc);color:white;border:none;border-radius:10px;padding:11px;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:var(--acc2)}
.copy-ok{background:var(--acc2)!important}

/* ── APP SHELL ── */
.app{min-height:100vh;min-height:100dvh;background:var(--bg);padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
.topbar{background:var(--top);height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.wm{font-family:'Italiana',serif;font-size:28px;letter-spacing:5px;color:#E8D8B4}
.tr{display:flex;align-items:center;gap:8px}
.pair-btn{display:flex;align-items:center;gap:3px;background:transparent;border:none;font-family:'Jost',sans-serif;font-size:12px;color:#7A6A4A;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .2s}
.pair-btn:hover{color:#E8D8B4}
.amp{font-family:'Cormorant Garamond',serif;font-style:italic;color:#B07848;margin:0 2px}
.sync-ico{display:flex;align-items:center;width:20px;height:20px;justify-content:center;font-size:12px}

/* ── TRIP BAR ── */
.tbar{background:var(--top);padding:0 16px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.trow{display:flex;gap:8px;overflow-x:auto;padding-top:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.trow::-webkit-scrollbar{display:none}
.tchip{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#7A6A4A;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:.4px;display:flex;align-items:center;gap:5px}
.tchip.on{background:#E8D8B4;border-color:#E8D8B4;color:var(--top);font-weight:600}
.tchip:not(.on):hover{border-color:#8A7050;color:#C4A870}
.tchip.add{border-style:dashed}
.del-chip{padding:5px 10px;border-radius:20px;border:1px solid rgba(255,60,60,.25);background:transparent;color:rgba(220,80,80,.7);font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;flex-shrink:0;transition:all .2s}
.del-chip:hover{background:rgba(220,80,80,.1);border-color:rgba(220,80,80,.5);color:rgba(220,80,80,1)}

/* ── HERO ── */
.hero{background:linear-gradient(155deg,#211609 0%,#382A14 55%,#281A0C 100%);padding:28px 20px 24px;position:relative;overflow:hidden}
.hglow{position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle at 80% 20%,rgba(176,120,72,.2),transparent 70%);pointer-events:none}
.hlbl{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#5C4820;margin-bottom:8px}
.hname{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:#F0E4C0;line-height:1.1;margin-bottom:4px}
.hdates{font-size:13px;color:#7A6840;font-weight:300}
.hstats{display:flex;gap:10px;margin-top:18px}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 14px;text-align:center}
.sn{display:block;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#D4B870}
.sl{display:block;font-size:10px;color:#5C4820;text-transform:uppercase;letter-spacing:.5px}

/* ── NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--top);display:flex;border-top:1px solid rgba(255,255,255,.04);z-index:200;padding-bottom:env(safe-area-inset-bottom,0);height:calc(72px + env(safe-area-inset-bottom,0px))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;cursor:pointer;position:relative;transition:transform .15s}
.nb:active{transform:scale(.91)}
.ni{display:flex;align-items:center;color:#4A3A1A;transition:color .2s,transform .3s cubic-bezier(.34,1.56,.64,1)}
.nb.on .ni{transform:scale(1.15) translateY(-1px)}
.nl{font-size:10px;color:#4A3A1A;font-weight:500;letter-spacing:.5px;text-transform:uppercase;transition:color .2s}
.pip{position:absolute;bottom:8px;width:4px;height:4px;border-radius:50%;animation:pip .3s cubic-bezier(.34,1.56,.64,1)}

/* ── CONTENT ── */
.content{padding:0 16px 12px}
.tc{padding-top:18px}
.sec{margin-bottom:26px}
.stitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;font-style:italic;color:var(--t1);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--div)}
.card{background:var(--card);border-radius:16px;padding:14px 16px;border:1px solid var(--brd);box-shadow:0 1px 8px rgba(26,18,9,.05);margin-bottom:10px}
.crow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--div);cursor:pointer}
.crow:last-child{border-bottom:none;padding-bottom:0}.crow.done{opacity:.42}.crow.done .ctext{text-decoration:line-through}
.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:white;font-size:12px;font-weight:700}
.cb.ck{background:var(--acc);border-color:var(--acc)}
.ctext{font-size:14px;flex:1;color:var(--t1)}
.who{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0}
.wp1{background:#E8EEE0;color:#3A5A2A}.wp2{background:#EEE0EC;color:#6A2A5A}.wboth{background:#EEE8D8;color:#6A4A1A}
.dh{display:flex;align-items:center;gap:10px;margin:14px 0 8px}
.dbadge{background:var(--acc);color:white;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.dname{font-size:13px;color:var(--t2);font-weight:500}
.act{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--div)}
.act:last-child{border-bottom:none}
.atime{font-size:12px;color:var(--t3);min-width:44px;margin-top:2px;font-weight:500}
.adot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.t-food{background:#C47858}.t-visit{background:#5A8A6A}.t-hotel{background:#8A7050}.t-activity{background:#7A5A8A}
.aname{font-size:14px;font-weight:500;color:var(--t1)}.anote{font-size:12px;color:var(--t3);margin-top:1px}
.prow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--div)}
.prow:last-child{border-bottom:none}
.pmark{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pm-food{background:#C47858}.pm-sight{background:#5A8A6A}.pm-sleep{background:#7A5A8A}.pm-shop{background:#8A7050}
.pinfo{flex:1}.pname{font-size:14px;font-weight:500}.pnote{font-size:12px;color:var(--t3);margin-top:1px}
.pbadge{font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:none;font-family:'Jost',sans-serif;font-weight:500}
.pb-want{background:#EEE8D8;color:var(--acc2)}.pb-done{background:#E0EEE0;color:#3A6A3A}
.budh{display:flex;justify-content:space-between;margin-bottom:12px}
.budl{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.budv{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--t1);font-weight:500}
.budtrack{background:var(--div);border-radius:10px;height:7px;overflow:hidden;margin-bottom:6px}
.budfill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--acc),#D4A860);transition:width .5s}
.budrem{font-size:12px;color:var(--t3);margin-bottom:14px}
.explist{border-top:1px solid var(--div);padding-top:8px}
.exprow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--div)}
.exprow:last-child{border-bottom:none}
.expdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-hotel{background:#8A7050}.d-food{background:#C47858}.d-trans{background:#5A6A8A}
.expcat{flex:1;font-size:14px}.expamt{font-size:14px;font-weight:600;color:var(--acc2)}
.mcard{background:var(--card);border-radius:18px;border:1px solid var(--brd);box-shadow:0 1px 10px rgba(26,18,9,.05);overflow:hidden;margin-bottom:16px}
.mhead{padding:16px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between}
.mdate{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;font-weight:500;color:var(--t1);line-height:1.3}
.atag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;flex-shrink:0;margin-left:10px;margin-top:3px}
.ap1{background:#E8EEE0;color:#3A5A2A}.ap2{background:#EEE0EC;color:#6A2A5A}
.mbody{padding:0 16px 14px;font-size:14px;color:var(--t2);line-height:1.8;font-weight:300}
.mfoot{padding:10px 16px;border-top:1px solid var(--div);display:flex;align-items:center;justify-content:space-between}
.mmood{font-size:20px}
.rbtn{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:5px 12px;display:flex;align-items:center;gap:5px;cursor:pointer;font-family:'Jost',sans-serif;font-size:12px;color:var(--t3);transition:all .2s}
.rbtn.on{background:#EEE8D8;border-color:var(--acc);color:var(--acc2)}
.ri{display:flex;align-items:center}.rc{font-weight:600}
.mem-empty{text-align:center;padding:48px 0;color:var(--t3)}
.mem-empty h3{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--t2);margin-bottom:8px}
.mem-empty p{font-size:14px}
.addbtn{width:100%;background:transparent;border:1.5px dashed var(--brd);border-radius:14px;padding:11px;font-size:13px;font-family:'Jost',sans-serif;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.addbtn:hover{border-color:var(--acc);color:var(--acc)}
.add-pri{width:100%;background:var(--t1);color:#F8F3E8;border:none;border-radius:14px;padding:13px;font-size:12px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px;transition:background .2s}
.add-pri:hover{background:var(--acc2)}
.empty{text-align:center;padding:60px 24px}
.eicon{font-size:48px;margin-bottom:16px}
.etitle{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--t1);margin-bottom:8px}
.esub{font-size:14px;color:var(--t3);line-height:1.7;margin-bottom:30px}
.btn-dark{background:var(--t1);color:#F8F3E8;border:none;border-radius:14px;padding:14px 36px;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;font-family:'Jost',sans-serif;cursor:pointer}

/* ── MODAL con fix de teclado ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:600;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.22,.61,.36,1);-webkit-overflow-scrolling:touch;padding-bottom:max(32px,env(safe-area-inset-bottom,0px))}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;font-weight:400;margin-bottom:6px;color:var(--t1)}
.modal p.sub{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.ff{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:16px;font-family:'Jost',sans-serif;background:#FDFAF4;color:var(--t1);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fta{min-height:88px;resize:vertical}
.egrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.emb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--brd);background:#FDFAF4;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emb.sel{border-color:var(--acc);background:#EEE8D8}
.brow{display:flex;gap:10px;margin-top:20px}
.bpri{flex:1;background:var(--t1);color:#F8F3E8;border:none;border-radius:12px;padding:13px;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;font-family:'Jost',sans-serif;cursor:pointer;transition:background .2s}
.bpri:hover{background:var(--acc2)}
.bsec{flex:1;background:var(--div);color:var(--t2);border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:500;font-family:'Jost',sans-serif;cursor:pointer}

.confirm-del{background:rgba(220,60,60,.06);border:1px solid rgba(220,60,60,.2);border-radius:12px;padding:14px;margin-bottom:16px}
.confirm-del p{font-size:13px;color:#8A3A3A;line-height:1.5;margin-bottom:12px}
.del-btn{width:100%;background:#C04040;color:white;border:none;border-radius:10px;padding:11px;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

// ── ICONS ──

const HEART_LOTTIE={v:"5.9.0",fr:60,ip:0,op:60,w:100,h:100,ddd:0,assets:[],layers:[{ddd:0,ind:1,ty:4,sr:1,ks:{o:{a:0,k:100},r:{a:0,k:0},p:{a:0,k:[50,50,0]},a:{a:0,k:[0,0,0]},s:{a:1,k:[{i:{x:[.4],y:[1]},o:{x:[.6],y:[0]},t:0,s:[80,80,100]},{i:{x:[.4],y:[1]},o:{x:[.6],y:[0]},t:15,s:[130,130,100]},{i:{x:[.4],y:[1]},o:{x:[.6],y:[0]},t:30,s:[90,90,100]},{t:50,s:[100,100,100]}]}},ao:0,shapes:[{ty:"gr",it:[{ty:"sh",ks:{a:0,k:{i:[[0,0],[5,-5],[10,0],[0,10],[-5,5],[0,0],[-5,5],[-10,0],[0,-10],[5,-5]],o:[[0,0],[-5,5],[-10,0],[0,-10],[5,-5],[0,0],[-5,5],[10,0],[0,10],[5,-5]],v:[[0,8],[0,8],[-18,-4],[-18,-14],[-8,-24],[0,-18],[0,-18],[18,-24],[18,-14],[8,-4]],c:true}}},{ty:"fl",c:{a:0,k:[0.69,0.47,0.28,1]},o:{a:0,k:100},r:1},{ty:"tr",p:{a:0,k:[0,0]},a:{a:0,k:[0,0]},s:{a:0,k:[100,100]},r:{a:0,k:0},o:{a:0,k:100}}]}],ip:0,op:60,st:0,bm:0}]};

const TABS=[
  {id:"plan",     label:"Viaje",     Ic:IMap,  color:"#6B4C2A"},
  {id:"places",   label:"Lugares",   Ic:IPin,  color:"#3D6B52"},
  {id:"budget",   label:"Gastos",    Ic:ICoin, color:"#4A5C7A"},
  {id:"memories", label:"Recuerdos", Ic:IBook, color:"#6B3D5C"},
];
const MOODS=["😍","🥰","🤩","😊","🥳","😌","🌟","💫","✨","🎉","🌈","🫶"];

// Intro slides data
const INTRO_SLIDES=[
  {icon:"✈️", bg:"#F0E8D8", title:"Planifiquen juntos", body:"Armen el itinerario, divídanse las tareas y lleguen listos a cada aventura sin olvidarse nada."},
  {icon:"📍", bg:"#E0EDD8", title:"Descubran lugares", body:"Guarden restaurantes, museos y rincones que quieren explorar. Márquenlos como visitados al ir."},
  {icon:"💰", bg:"#D8E0EC", title:"Controlen el presupuesto", body:"Vean cuánto llevan gastado en cada categoría y mantengan todo bajo control sin drama."},
  {icon:"📖", bg:"#EDD8E8", title:"Escriban sus recuerdos", body:"Un diario compartido para los dos. Cada momento especial, guardado con la voz de quien lo vivió."},
];

const BLOB_API="https://jsonblob.com/api/jsonblob";
async function syncRead(id){
  try{const r=await fetch(`${BLOB_API}/${id}`);if(!r.ok)return null;return await r.json();}catch{return null;}
}
async function syncWrite(id,data){
  try{const r=await fetch(`${BLOB_API}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(data)});return r.ok;}catch{return false;}
}
async function syncCreate(data){
  try{
    const r=await fetch(BLOB_API,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(data)});
    if(!r.ok)return null;
    const loc=r.headers.get("Location")||"";
    return loc.split("/").pop()||null;
  }catch{return null;}
}

const LS={
  get:k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ── Fix teclado: scroll input into view on focus ──
function useKeyboardFix(){
  useEffect(()=>{
    const handler=e=>{
      const el=e.target;
      if(el.tagName==="INPUT"||el.tagName==="TEXTAREA"||el.tagName==="SELECT"){
        setTimeout(()=>{
          el.scrollIntoView({behavior:"smooth",block:"center"});
        },350);
      }
    };
    document.addEventListener("focusin",handler);
    return()=>document.removeEventListener("focusin",handler);
  },[]);
}

// ── APP ──
function App(){
  const saved=LS.get("juntos-local")||{};
  const [screen,setScreen]=useState(saved.profile?.p1?'app':'onboarding');
  const [profile,setProfile]=useState(saved.profile||{p1:"",p2:""});
  const [pairCode,setPairCode]=useState(saved.pairCode||"");
  const [trips,setTrips]=useState(saved.trips||[]);
  const [activeTrip,setActiveTrip]=useState(saved.trips?.[0]?.id||null);
  const [tab,setTab]=useState("plan");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [circ,setCirc]=useState(null);
  const [syncSt,setSyncSt]=useState("idle");
  const [editProf,setEditProf]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const pendingTab=useRef(null);
  const lottieInst=useRef({});
  const lastSaved=useRef(0);
  const ignoreNext=useRef(false);
  useKeyboardFix();

  useEffect(()=>{LS.set("juntos-local",{profile,trips,pairCode});},[profile,trips,pairCode]);

  useEffect(()=>{
    if(screen!=="app"||!pairCode) return;
    const iv=setInterval(async()=>{
      if(ignoreNext.current){ignoreNext.current=false;return;}
      const d=await syncRead(pairCode);
      if(d&&d.ts&&d.ts>lastSaved.current){
        lastSaved.current=d.ts;
        if(d.trips){setTrips(d.trips);if(!activeTrip&&d.trips[0])setActiveTrip(d.trips[0].id);}
        if(d.profile)setProfile(p=>({...p,...d.profile}));
      }
    },5000);
    return()=>clearInterval(iv);
  },[screen,pairCode]);

  const saveCloud=useCallback(async(t,p,pc)=>{
    const code=pc||pairCode;if(!code)return;
    const ts=Date.now();lastSaved.current=ts;setSyncSt("saving");
    ignoreNext.current=true;
    const ok=await syncWrite(code,{trips:t,profile:p,ts});
    setSyncSt(ok?"saved":"idle");
    if(ok)setTimeout(()=>setSyncSt("idle"),2000);
  },[pairCode]);

  const mountHeart=useCallback((el,id)=>{
    if(!el||!window.lottie)return;
    if(lottieInst.current[id])lottieInst.current[id].destroy();
    lottieInst.current[id]=window.lottie.loadAnimation({container:el,renderer:"svg",loop:false,autoplay:true,animationData:HEART_LOTTIE});
  },[]);

  const changeTab=(newTab,e)=>{
    if(newTab===tab)return;
    const r=e.currentTarget.getBoundingClientRect();
    const color=TABS.find(t=>t.id===newTab)?.color||"#6B4C2A";
    pendingTab.current=newTab;
    setCirc({x:r.left+r.width/2,y:r.top+r.height/2,color,phase:"in"});
    setTimeout(()=>setTab(pendingTab.current),300);
    setTimeout(()=>setCirc(c=>c?{...c,phase:"out"}:null),380);
    setTimeout(()=>setCirc(null),720);
  };

  const trip=trips.find(t=>t.id===activeTrip);
  const doneChecks=trip?trip.checklist.filter(c=>c.done).length:0;
  const pct=trip?Math.min(100,Math.round(trip.budget.spent/trip.budget.total*100)):0;

  const upd=(id,fn)=>{setTrips(prev=>{const next=prev.map(t=>t.id===id?fn(t):t);saveCloud(next,profile);return next;});};
  const togCheck=id=>upd(activeTrip,t=>({...t,checklist:t.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)}));
  const togPlace=id=>upd(activeTrip,t=>({...t,places:t.places.map(p=>p.id===id?{...p,status:p.status==="want"?"done":"want"}:p)}));
  const addReact=(mid,el)=>{upd(activeTrip,t=>({...t,memories:t.memories.map(m=>m.id===mid?{...m,reactions:{...m.reactions,heart:(m.reactions.heart||0)+1}}:m)}));if(el)mountHeart(el,`m${mid}`);};
  const open=type=>{setForm({});setModal(type);};
  const close=()=>setModal(null);

  const deleteTrip=()=>{
    const next=trips.filter(t=>t.id!==activeTrip);
    setTrips(next);
    setActiveTrip(next[0]?.id||null);
    saveCloud(next,profile);
    setConfirmDel(false);
  };

  const saveMem=()=>{
    if(!form.title||!form.text)return;
    upd(activeTrip,t=>({...t,memories:[{id:Date.now(),title:form.title,
      date:new Date().toLocaleDateString("es-AR",{day:"numeric",month:"short"})+" · "+new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
      author:form.author||"p1",text:form.text,mood:form.mood||"😊",reactions:{heart:0}
    },...t.memories]}));close();
  };
  const savePlace=()=>{if(!form.name)return;upd(activeTrip,t=>({...t,places:[...t.places,{id:Date.now(),name:form.name,note:form.note||"",type:form.type||"sight",status:"want"}]}));close();};
  const saveCheck=()=>{if(!form.text)return;upd(activeTrip,t=>({...t,checklist:[...t.checklist,{id:Date.now(),text:form.text,done:false,who:form.who||"both"}]}));close();};
  const saveTrip=()=>{
    if(!form.name)return;
    const nt={id:Date.now(),name:form.name,dates:form.dates||"Por definir",days:parseInt(form.days)||0,budget:{total:parseInt(form.budget)||0,spent:0},itinerary:[],checklist:[],expenses:[],places:[],memories:[]};
    const next=[...trips,nt];setTrips(next);setActiveTrip(nt.id);saveCloud(next,profile);close();
  };

  const finishOnboarding=async(p,code)=>{
    setProfile(p);setPairCode(code);setScreen("app");
    saveCloud([],p,code);
  };

  const p1=profile.p1||"Vos";
  const p2=profile.p2||"Tu amor";

  if(screen==="onboarding")return <Onboarding onComplete={finishOnboarding}/>;

  const activeT=TABS.find(t=>t.id===tab);

  return(<>
    {circ&&<div key={`${circ.x}${circ.y}`} className={`cr ${circ.phase}`} style={{left:circ.x,top:circ.y,background:circ.color}}/>}
    <div className="app">
      <header className="topbar">
        <div className="wm">juntos</div>
        <div className="tr">
          {syncSt==="saving"&&<span className="sync-ico" style={{color:"#8A7A5A",animation:"spin .8s linear infinite",display:"flex"}}><ISync/></span>}
          {syncSt==="saved"&&<span style={{color:"#5A8A5A",fontSize:13,fontWeight:700}}>✓</span>}
          <button className="pair-btn" onClick={()=>{setForm({p1:profile.p1,p2:profile.p2});setEditProf(true);}}>
            {p1}<span className="amp"> & </span>{p2}<span style={{marginLeft:4,opacity:.4,display:"flex"}}><IEdit/></span>
          </button>
        </div>
      </header>

      <div className="tbar">
        <div className="trow">
          {trips.map(t=><button key={t.id} className={`tchip ${t.id===activeTrip?"on":""}`} onClick={()=>setActiveTrip(t.id)}>{t.name}</button>)}
          <button className="tchip add" onClick={()=>open("trip")}><IPlus/> Nuevo</button>
          {trip&&<button className="del-chip" onClick={()=>setConfirmDel(true)} title="Eliminar viaje"><ITrash/></button>}
        </div>
      </div>

      {!trip?(
        <div className="empty">
          <div className="eicon">✈️</div>
          <h2 className="etitle">¿A dónde van primero?</h2>
          <p className="esub">Creen su primer viaje y empiecen a planificar juntos.</p>
          <button className="btn-dark" onClick={()=>open("trip")}>Crear viaje</button>
        </div>
      ):(
        <>
          <section className="hero">
            <div className="hglow"/>
            <div className="hlbl">Próximo destino</div>
            <h1 className="hname">{trip.name}</h1>
            <div className="hdates">{trip.dates}</div>
            <div className="hstats">
              {[[trip.days,"días"],[`${doneChecks}/${trip.checklist.length}`,"listos"],[trip.memories.length,"recuerdos"],[`${pct}%`,"budget"]].map(([n,l])=>(
                <div key={l} className="stat"><span className="sn">{n}</span><span className="sl">{l}</span></div>
              ))}
            </div>
          </section>
          <main className="content" key={tab}>
            {tab==="plan"&&<PlanTab trip={trip} togCheck={togCheck} open={open} p1={p1} p2={p2}/>}
            {tab==="places"&&<PlacesTab trip={trip} togPlace={togPlace} open={open}/>}
            {tab==="budget"&&<BudgetTab trip={trip} pct={pct}/>}
            {tab==="memories"&&<MemoriesTab trip={trip} addReact={addReact} mountHeart={mountHeart} open={open} p1={p1} p2={p2}/>}
          </main>
        </>
      )}

      <nav className="bnav">
        {TABS.map(t=><button key={t.id} className={`nb ${tab===t.id?"on":""}`} onClick={e=>changeTab(t.id,e)}>
          <span className="ni" style={tab===t.id?{color:t.color}:{}}><t.Ic/></span>
          <span className="nl" style={tab===t.id?{color:t.color}:{}}>{t.label}</span>
          {tab===t.id&&<span className="pip" style={{background:t.color}}/>}
        </button>)}
      </nav>
    </div>

    {modal&&<div className="overlay" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
      {modal==="memory"&&<MemModal form={form} sf={setForm} onSave={saveMem} onClose={close} p1={p1} p2={p2}/>}
      {modal==="place"&&<PlaceModal form={form} sf={setForm} onSave={savePlace} onClose={close}/>}
      {modal==="check"&&<CheckModal form={form} sf={setForm} onSave={saveCheck} onClose={close} p1={p1} p2={p2}/>}
      {modal==="trip"&&<TripModal form={form} sf={setForm} onSave={saveTrip} onClose={close}/>}
    </div></div>}

    {confirmDel&&<div className="overlay" onClick={()=>setConfirmDel(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Eliminar viaje</h2>
      <p className="sub">¿Seguro que quieren eliminar <strong>{trip?.name}</strong>? Esto no se puede deshacer.</p>
      <div className="confirm-del">
        <p>Se van a borrar todos los datos: checklist, lugares, gastos y recuerdos de este viaje.</p>
        <button className="del-btn" onClick={deleteTrip}>Sí, eliminar</button>
      </div>
      <button className="bsec" style={{width:"100%"}} onClick={()=>setConfirmDel(false)}>Cancelar</button>
    </div></div>}

    {editProf&&<div className="overlay" onClick={()=>setEditProf(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Sus nombres</h2>
      <p className="sub">Apodos, nombres de cariño, lo que quieran.</p>
      <F label="Tu nombre"><input className="fi" defaultValue={profile.p1} onChange={e=>setForm({...form,p1:e.target.value})}/></F>
      <F label="Tu pareja"><input className="fi" defaultValue={profile.p2} onChange={e=>setForm({...form,p2:e.target.value})}/></F>
      <div className="brow">
        <button className="bsec" onClick={()=>setEditProf(false)}>Cancelar</button>
        <button className="bpri" onClick={()=>{const np={p1:form.p1??profile.p1,p2:form.p2??profile.p2};setProfile(np);saveCloud(trips,np);setEditProf(false);}}>Guardar</button>
      </div>
    </div></div>}
  </>);
}

// ── ONBOARDING ──
function Onboarding({onComplete}){
  const [step,setStep]=useState(0);   // 0=splash 1=intro-slides 2=nombres 3=pair 4=show-code
  const [slide,setSlide]=useState(0);
  const [p1,setP1]=useState("");
  const [p2,setP2]=useState("");
  const [pairInput,setPairInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [generatedCode,setGeneratedCode]=useState("");
  const [copied,setCopied]=useState(false);
  useKeyboardFix();

  const handleNew=async()=>{
    if(!p1.trim()||!p2.trim())return;
    setLoading(true);setError("");
    const id=await syncCreate({trips:[],profile:{p1:p1.trim(),p2:p2.trim()},ts:Date.now()});
    setLoading(false);
    if(!id){setError("No se pudo conectar. Revisá tu internet e intentá de nuevo.");return;}
    setGeneratedCode(id);
    setStep(4);
  };

  const handleJoin=async()=>{
    if(!pairInput.trim()||!p1.trim())return;
    setLoading(true);setError("");
    const d=await syncRead(pairInput.trim());
    setLoading(false);
    if(!d){setError("No encontramos ese código. Verificá que esté bien escrito.");return;}
    onComplete({p1:p1.trim(),p2:d.profile?.p1||d.profile?.p2||"Tu pareja"},pairInput.trim());
  };

  const copyCode=()=>{
    if(navigator.clipboard){navigator.clipboard.writeText(generatedCode).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});}
    else{
      const ta=document.createElement("textarea");ta.value=generatedCode;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2500);
    }
  };

  return(
    <div className="ob">
      <div className="ob-r" style={{width:340,height:340,top:-100,right:-100}}/>
      <div className="ob-r" style={{width:580,height:580,bottom:-250,left:-180,borderColor:"rgba(138,92,42,.07)"}}/>
      <div className="ob-r" style={{width:240,height:240,top:"40%",right:-80,borderColor:"rgba(138,92,42,.1)"}}/>

      {/* SPLASH */}
      {step===0&&<div className="ob-content ob-splash fi">
        <div className="ob-orn">◆</div>
        <div className="ob-center">
          <h1 className="ob-wm">juntos</h1>
          <div className="ob-line"/>
          <p className="ob-tag">Un diario de viaje<br/>para los dos</p>
        </div>
        <div className="ob-bot">
          <div className="ob-dots">◦ · ◦ · ◦</div>
          <p className="ob-desc">Planifiquen escapadas, descubran lugares<br/>y guarden los momentos que importan.</p>
          <button className="ob-cta" onClick={()=>setStep(1)}>Comenzar</button>
        </div>
      </div>}

      {/* INTRO SLIDES */}
      {step===1&&<div className="ob-content fi" style={{paddingTop:16}}>
        <div className="ob-mini" style={{marginBottom:24}}>juntos</div>
        <div className="slides-wrap">
          <div className="slides-track" style={{transform:`translateX(-${slide*100}%)`}}>
            {INTRO_SLIDES.map((s,i)=><div key={i} className="slide">
              <div className="slide-icon" style={{background:s.bg}}>{s.icon}</div>
              <h3 className="slide-title">{s.title}</h3>
              <p className="slide-body">{s.body}</p>
            </div>)}
          </div>
        </div>
        <div className="slide-dots">
          {INTRO_SLIDES.map((_,i)=><div key={i} className={`sdot ${i===slide?"on":""}`} onClick={()=>setSlide(i)}/>)}
        </div>
        <div className="slides-nav">
          {slide>0&&<button className="sback" onClick={()=>setSlide(s=>s-1)}>←</button>}
          {slide<INTRO_SLIDES.length-1
            ?<button className="snext" onClick={()=>setSlide(s=>s+1)}>Siguiente →</button>
            :<button className="snext" onClick={()=>setStep(2)}>Empezar →</button>
          }
        </div>
        <button className="ob-back" onClick={()=>setStep(0)}>← Volver</button>
      </div>}

      {/* NOMBRES */}
      {step===2&&<div className="ob-content fi">
        <div className="ob-mini">juntos</div>
        <h2 className="ob-nt">¿Cómo se llaman?</h2>
        <p className="ob-ns">Usen apodos, nombres de cariño,<br/>lo que quieran ver en la app.</p>
        <div className="ob-fields">
          <div className="ob-lbl">Tu nombre</div>
          <input className="ob-inp" placeholder="Lucas, Lucho…" value={p1} onChange={e=>setP1(e.target.value)} autoFocus/>
          <div className="ob-amp">&</div>
          <input className="ob-inp" placeholder="Brenda, Bren, amor…" value={p2} onChange={e=>setP2(e.target.value)}/>
        </div>
        {p1&&p2&&<div className="ob-prev fi"><span>{p1}</span><em> & </em><span>{p2}</span></div>}
        <button className="ob-cta noani" disabled={!p1.trim()||!p2.trim()} onClick={()=>setStep(3)}>Siguiente →</button>
        <button className="ob-back" onClick={()=>setStep(1)}>← Volver</button>
      </div>}

      {/* CREAR O UNIRSE */}
      {step===3&&<div className="ob-content fi">
        <div className="ob-mini">juntos</div>
        <h2 className="ob-nt">Espacio compartido</h2>
        <p className="ob-ns" style={{marginBottom:20}}>Para que todo lo que hagan se vea en los dos dispositivos.</p>

        <div className="pc-box">
          <div className="pc-label">Crear nuevo espacio</div>
          <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.6,marginBottom:14}}>
            Sos el primero en entrar. Vas a recibir un código para compartirle a {p2||"tu pareja"}.
          </p>
          <button className="ob-cta noani" disabled={loading} style={{padding:"13px"}} onClick={handleNew}>
            {loading?"Creando espacio…":"Crear y obtener mi código"}
          </button>
        </div>

        <div className="pc-or">— o —</div>

        <div className="pc-box">
          <div className="pc-label">{p2||"Tu pareja"} ya creó el espacio</div>
          <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.6,marginBottom:10}}>
            Pegá el código que te compartió.
          </p>
          <div className="ff">
            <label className="fl">Código</label>
            <input className="fi" placeholder="Pegá el código aquí" value={pairInput} onChange={e=>setPairInput(e.target.value)} style={{fontFamily:"monospace",fontSize:13}}/>
          </div>
          {error&&<p style={{color:"#C04040",fontSize:12,marginTop:4,marginBottom:8,lineHeight:1.4}}>{error}</p>}
          <button className="ob-cta noani" disabled={!pairInput.trim()||loading} style={{padding:"13px",marginTop:8}} onClick={handleJoin}>
            {loading?"Verificando…":"Unirme al espacio"}
          </button>
        </div>

        <button className="ob-back" onClick={()=>setStep(2)}>← Volver</button>
      </div>}

      {/* MOSTRAR CÓDIGO GENERADO */}
      {step===4&&<div className="ob-content fi">
        <div className="ob-mini">juntos</div>
        <h2 className="ob-nt" style={{marginBottom:8}}>¡Tu código está listo!</h2>
        <p className="ob-ns" style={{marginBottom:20}}>
          Compartile este código a {p2||"tu pareja"} para que se una al espacio compartido.
        </p>

        <div className="code-display">
          <div style={{fontSize:10,fontWeight:600,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Tu código de pareja</div>
          <div className="code-val">{generatedCode}</div>
          <button className={`copy-btn ${copied?"copy-ok":""}`} onClick={copyCode}>
            {copied?"¡Copiado! ✓":"Copiar código"}
          </button>
        </div>

        <div style={{background:"rgba(176,120,72,.07)",borderRadius:12,padding:"12px 14px",marginBottom:20,fontSize:13,color:"var(--t2)",lineHeight:1.65}}>
          <strong style={{display:"block",fontSize:10,textTransform:"uppercase",letterSpacing:1,color:"var(--t3)",marginBottom:5}}>Cómo se une {p2||"tu pareja"}</strong>
          Abre la app → toca "Comenzar" → ingresa su nombre → elige "Unirme al espacio" → pega este código.
        </div>

        <button className="ob-cta noani" onClick={()=>onComplete({p1:p1.trim(),p2:p2.trim()},generatedCode)}>
          Entrar a la app →
        </button>
      </div>}
    </div>
  );
}

// ── TABS ──
function PlanTab({trip,togCheck,open,p1,p2}){
  const wl=w=>w==="both"?"Ambos":w==="p1"?p1:p2;
  return(<div className="tc fu">
    <Sec title="Antes de partir">
      <div className="card">
        {trip.checklist.length===0&&<p style={{textAlign:"center",color:"var(--t3)",fontSize:14,padding:"8px 0"}}>Sin ítems aún</p>}
        {trip.checklist.map(i=>(
          <div key={i.id} className={`crow ${i.done?"done":""}`} onClick={()=>togCheck(i.id)}>
            <div className={`cb ${i.done?"ck":""}`}>{i.done&&"✓"}</div>
            <span className="ctext">{i.text}</span>
            <span className={`who w${i.who}`}>{wl(i.who)}</span>
          </div>
        ))}
      </div>
      <AddBtn onClick={()=>open("check")}>Agregar ítem</AddBtn>
    </Sec>
    <Sec title="Itinerario">
      {trip.itinerary.length===0
        ?<div className="card" style={{textAlign:"center",color:"var(--t3)",fontSize:14,padding:"16px"}}>Sin actividades aún</div>
        :trip.itinerary.map(day=><div key={day.day}>
          <div className="dh"><span className="dbadge">Día {day.day}</span><span className="dname">{day.dayName}</span></div>
          <div className="card">{day.activities.map((a,i)=><div key={i} className="act">
            <span className="atime">{a.time}</span><span className={`adot t-${a.type}`}/>
            <div><div className="aname">{a.name}</div>{a.note&&<div className="anote">{a.note}</div>}</div>
          </div>)}</div>
        </div>)}
    </Sec>
  </div>);
}

function PlacesTab({trip,togPlace,open}){
  return(<div className="tc fu"><Sec title="Lugares para descubrir">
    <div className="card">
      {trip.places.length===0&&<p style={{textAlign:"center",color:"var(--t3)",fontSize:14,padding:"8px 0"}}>Sin lugares aún</p>}
      {trip.places.map(p=><div key={p.id} className="prow">
        <div className={`pmark pm-${p.type}`}/><div className="pinfo"><div className="pname">{p.name}</div>{p.note&&<div className="pnote">{p.note}</div>}</div>
        <button className={`pbadge pb-${p.status}`} onClick={()=>togPlace(p.id)}>{p.status==="done"?"Visitado":"Pendiente"}</button>
      </div>)}
    </div>
    <AddBtn onClick={()=>open("place")}>Agregar lugar</AddBtn>
  </Sec></div>);
}

function BudgetTab({trip,pct}){
  return(<div className="tc fu"><Sec title="Presupuesto del viaje">
    <div className="card">
      <div className="budh">
        <div><div className="budl">Gastado</div><div className="budv">${trip.budget.spent.toLocaleString("es-AR")}</div></div>
        <div style={{textAlign:"right"}}><div className="budl">Total</div><div className="budv">${trip.budget.total.toLocaleString("es-AR")}</div></div>
      </div>
      <div className="budtrack"><div className="budfill" style={{width:`${pct}%`}}/></div>
      <div className="budrem">{100-pct}% disponible</div>
      {trip.expenses.length>0&&<div className="explist">{trip.expenses.map((e,i)=><div key={i} className="exprow">
        <div className={`expdot d-${e.dot}`}/><span className="expcat">{e.cat}</span><span className="expamt">${e.amount.toLocaleString("es-AR")}</span>
      </div>)}</div>}
      {trip.expenses.length===0&&<p style={{textAlign:"center",color:"var(--t3)",fontSize:14,paddingTop:8}}>Sin gastos registrados</p>}
    </div>
  </Sec></div>);
}

function MemoriesTab({trip,addReact,mountHeart,open,p1,p2}){
  return(<div className="tc fu">
    <button className="add-pri" onClick={()=>open("memory")}>Escribir un recuerdo</button>
    {trip.memories.length===0
      ?<div className="mem-empty"><div style={{fontSize:36,marginBottom:12}}>📖</div><h3>El diario está en blanco</h3><p>Empiecen a escribir sus recuerdos</p></div>
      :trip.memories.map(m=><MemCard key={m.id} m={m} onReact={addReact} mountHeart={mountHeart} p1={p1} p2={p2}/>)
    }
  </div>);
}

function MemCard({m,onReact,mountHeart,p1,p2}){
  const lref=useRef(null);const[did,setDid]=useState(false);
  const aname=m.author==="p1"?p1:p2;const acls=m.author==="p1"?"ap1":"ap2";
  const react=()=>{if(did)return;setDid(true);onReact(m.id,lref.current);};
  return(<article className="mcard fu">
    <header className="mhead"><div><time className="mdate">{m.date}</time><h3 className="mtitle">{m.title}</h3></div><span className={`atag ${acls}`}>{aname}</span></header>
    <p className="mbody">{m.text}</p>
    <footer className="mfoot"><span className="mmood">{m.mood}</span>
      <button className={`rbtn ${did?"on":""}`} onClick={react}>
        <span ref={r=>{if(r&&did)mountHeart(r,`m${m.id}`)}} style={{display:did?"inline-block":"none",width:22,height:22,verticalAlign:"middle"}}/>
        {!did&&<span className="ri"><IHeart/></span>}
        {m.reactions.heart>0&&<span className="rc">{m.reactions.heart}</span>}
      </button>
    </footer>
  </article>);
}

// ── MODALS ──
function MemModal({form,sf,onSave,onClose,p1,p2}){return<><h2>Nuevo recuerdo</h2><F label="Título"><input className="fi" placeholder="El momento que quieren recordar…" value={form.title||""} onChange={e=>sf({...form,title:e.target.value})}/></F><F label="Cuéntalo"><textarea className="fi fta" placeholder="Lo que sentiste, lo que pasó…" value={form.text||""} onChange={e=>sf({...form,text:e.target.value})}/></F><F label="¿Quién escribe?"><select className="fi" value={form.author||"p1"} onChange={e=>sf({...form,author:e.target.value})}><option value="p1">{p1}</option><option value="p2">{p2}</option></select></F><F label="Estado de ánimo"><div className="egrid">{MOODS.map(m=><button key={m} className={`emb ${form.mood===m?"sel":""}`} onClick={()=>sf({...form,mood:m})}>{m}</button>)}</div></F><Btns onCancel={onClose} onSave={onSave} label="Guardar recuerdo"/></>;}
function PlaceModal({form,sf,onSave,onClose}){return<><h2>Agregar lugar</h2><F label="Nombre del lugar"><input className="fi" placeholder="Café Tortoni, MALBA…" value={form.name||""} onChange={e=>sf({...form,name:e.target.value})}/></F><F label="Nota"><input className="fi" placeholder="Por qué quieren ir, horarios…" value={form.note||""} onChange={e=>sf({...form,note:e.target.value})}/></F><F label="Tipo"><select className="fi" value={form.type||"sight"} onChange={e=>sf({...form,type:e.target.value})}><option value="food">Para comer</option><option value="sight">Para ver</option><option value="sleep">Para dormir</option><option value="shop">Para comprar</option></select></F><Btns onCancel={onClose} onSave={onSave} label="Agregar"/></>;}
function CheckModal({form,sf,onSave,onClose,p1,p2}){return<><h2>Agregar ítem</h2><F label="Tarea o cosa a llevar"><input className="fi" placeholder="Reservar hotel, cargar cámara…" value={form.text||""} onChange={e=>sf({...form,text:e.target.value})}/></F><F label="Responsable"><select className="fi" value={form.who||"both"} onChange={e=>sf({...form,who:e.target.value})}><option value="p1">{p1}</option><option value="p2">{p2}</option><option value="both">Ambos</option></select></F><Btns onCancel={onClose} onSave={onSave} label="Agregar"/></>;}
function TripModal({form,sf,onSave,onClose}){return<><h2>Nuevo viaje</h2><F label="Destino"><input className="fi" placeholder="Mendoza, Bariloche, Roma…" value={form.name||""} onChange={e=>sf({...form,name:e.target.value})}/></F><F label="Fechas"><input className="fi" placeholder="14 – 18 Mar 2026" value={form.dates||""} onChange={e=>sf({...form,dates:e.target.value})}/></F><F label="Días"><input className="fi" type="number" inputMode="numeric" placeholder="5" value={form.days||""} onChange={e=>sf({...form,days:e.target.value})}/></F><F label="Presupuesto ($)"><input className="fi" type="number" inputMode="numeric" placeholder="150000" value={form.budget||""} onChange={e=>sf({...form,budget:e.target.value})}/></F><Btns onCancel={onClose} onSave={onSave} label="Crear viaje"/></>;}

// ── ATOMS ──
const Sec=({title,children})=><div className="sec"><h3 className="stitle">{title}</h3>{children}</div>;
const AddBtn=({onClick,children})=><button className="addbtn" onClick={onClick}><IPlus/>{children}</button>;
const F=({label,children})=><div className="ff"><label className="fl">{label}</label>{children}</div>;
const Btns=({onCancel,onSave,label})=><div className="brow"><button className="bsec" onClick={onCancel}>Cancelar</button><button className="bpri" onClick={onSave}>{label}</button></div>;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
